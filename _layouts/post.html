---
layout: default
---

<article class="post">
  <header class="post-header">
    <a href="/blog/" class="back-link">← all posts</a>
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time>{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.tags %}
        <span class="post-tags">
          {% for tag in page.tags %}
            <span class="tag">{{ tag }}</span>
          {% endfor %}
        </span>
      {% endif %}
    </div>
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
