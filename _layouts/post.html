---
layout: default
---

<article class="post">
  <header class="post-header">
    <a href="{{ '/blog/' | relative_url }}" class="back-link">← all posts</a>
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time>{{ page.date | date: "%B %-d, %Y" }}</time>
      <span>{{ page.content | number_of_words }} words</span>
      {% if page.tags %}
        <span class="post-tags">
          {% for tag in page.tags %}
            <span class="tag">{{ tag }}</span>
          {% endfor %}
        </span>
      {% endif %}
    </div>
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>

<div class="kudos-wrap">
  <button class="kudos-btn" id="kudos-btn" onclick="giveKudos()">
    <span id="kudos-icon">✦</span>
    <span id="kudos-count">—</span>
  </button>
  <p class="kudos-label">give kudos</p>
</div>

<style>
  .kudos-wrap {
    margin-top: 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .kudos-btn {
    background: rgba(10,5,20,0.75);
    border: 1.5px solid rgba(168,85,247,0.4);
    border-radius: 50%;
    width: 64px;
    height: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: inherit;
    gap: 2px;
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
  }

  .kudos-btn:hover {
    border-color: #a855f7;
    box-shadow: 0 0 24px rgba(168,85,247,0.3);
    transform: scale(1.08);
  }

  .kudos-btn.clicked {
    border-color: #a855f7;
    box-shadow: 0 0 32px rgba(168,85,247,0.5);
    background: rgba(168,85,247,0.15);
  }

  #kudos-icon {
    font-size: 1.2rem;
    color: #a855f7;
  }

  #kudos-count {
    font-size: 0.72rem;
    color: rgba(240,232,255,0.6);
    font-family: inherit;
  }

  .kudos-label {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.06em;
  }
</style>

<script>
(function() {
  const SUPABASE_URL = 'https://kubmqwqsrjyzohuuzlqp.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1Ym1xd3Fzcmp5em9odXV6bHFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMzAzMTYsImV4cCI6MjA5MjkwNjMxNn0.U79OyoU7YbKUBHRWJkvwaWPdXzVCDZfPpYFvxPQeu8o';

  const slug = window.location.pathname;
  const storageKey = 'kudos_given_' + slug;
  const btn = document.getElementById('kudos-btn');
  const countEl = document.getElementById('kudos-count');

  if (localStorage.getItem(storageKey)) {
    btn.classList.add('clicked');
  }

  fetch(`${SUPABASE_URL}/rest/v1/kudos?slug=eq.${encodeURIComponent(slug)}&select=count`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    }
  })
  .then(r => r.json())
  .then(data => {
    countEl.textContent = (data.length && data[0].count) ? data[0].count : 0;
  })
  .catch(() => { countEl.textContent = '0'; });

  window.giveKudos = function() {
    if (localStorage.getItem(storageKey)) return;

    localStorage.setItem(storageKey, '1');
    btn.classList.add('clicked');

    const current = parseInt(countEl.textContent) || 0;
    countEl.textContent = current + 1;

    fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_kudos`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ post_slug: slug })
    })
    .catch(() => {
      // If call fails, revert
      localStorage.removeItem(storageKey);
      btn.classList.remove('clicked');
      countEl.textContent = current;
    });
  };
})();
</script>
